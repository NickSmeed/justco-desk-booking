<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JustCo Hot Desk Bookings</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  input, button { font-family: inherit; }
  button { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const SUPABASE_URL = "https://zjvhisxplungdfcxwrck.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpqdmhpc3hwbHVuZ2RmY3h3cmNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODc2NzksImV4cCI6MjA5MDU2MzY3OX0.Y_zGdTftMYa_M4QiDtTBa29daqo3DDuToJiZXXHNicU";
const GOOGLE_CLIENT_ID = "848943490883-osiv0c5aa8rhsq8j4d0j4opspuna3g9k.apps.googleusercontent.com";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const UNIT = 40, DW = 4, DH = 2, PAD = 3;
const GCOLS = 18, GROWS = 12;
const SVG_W = GCOLS * UNIT, SVG_H = GROWS * UNIT;
const ADMIN_PIN = "1234"; // <-- CHANGE THIS

const gx = (x) => x * UNIT;
const gy = (y) => y * UNIT;
const today = () => new Date().toISOString().split("T")[0];
const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-AU", { weekday: "short", day: "numeric", month: "short", year: "numeric" });
const urlDate = () => { const p = new URLSearchParams(window.location.search).get("date"); return p && /^\d{4}-\d{2}-\d{2}$/.test(p) ? p : today(); };
const addDays = (d, n) => { const [y, m, day] = d.split("-").map(Number); const dt = new Date(y, m - 1, day + n); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`; };
const maxDate = () => addDays(today(), 14);
const clampDesk = (x, y, r) => ({ x: Math.max(0, Math.min(GCOLS-(r?DH:DW), x)), y: Math.max(0, Math.min(GROWS-(r?DW:DH), y)) });

function App() {
  const [user, setUser] = useState(null);
  const [desks, setDesks] = useState([]);
  const [bookings, setBookings] = useState({});
  const [date, setDate] = useState(urlDate());
  const [editMode, setEditMode] = useState(false);
  const [pinModal, setPinModal] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);
  const [modal, setModal] = useState(null);
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const [appLoading, setAppLoading] = useState(true);
  const [dragId, setDragId] = useState(null);
  const [dragStart, setDragStart] = useState(null);
  const [livePos, setLivePos] = useState(null);
  const svgRef = useRef(null);

  // Google Sign-In
  useEffect(() => {
    const stored = sessionStorage.getItem("gsi_user");
    if (stored) setUser(JSON.parse(stored));
    if (window.google) initGsi();
    else window.addEventListener("load", initGsi);
    return () => window.removeEventListener("load", initGsi);
  }, []);

  const initGsi = () => {
    if (!window.google) return;
    window.google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: (resp) => {
        const payload = JSON.parse(atob(resp.credential.split(".")[1]));
        const u = { email: payload.email, name: payload.name, picture: payload.picture };
        setUser(u);
        sessionStorage.setItem("gsi_user", JSON.stringify(u));
      }
    });
    window.google.accounts.id.renderButton(document.getElementById("g-signin-btn"), {
      theme: "outline", size: "large", text: "sign_in_with", shape: "rectangular"
    });
  };

  const signOut = () => {
    window.google?.accounts.id.disableAutoSelect();
    sessionStorage.removeItem("gsi_user");
    setUser(null);
  };

  // Load desks
  useEffect(() => {
    const load = async () => {
      setAppLoading(true);
      const { data, error } = await db.from("desks").select("*");
      if (!error && data && data.length > 0)
        setDesks(data.map(d => ({ ...d, x: Number(d.x), y: Number(d.y), r: d.r === true || d.r === 1 })));
      setAppLoading(false);
    };
    load();
  }, []);

  // Load bookings
  useEffect(() => {
    const load = async () => {
      const { data, error } = await db.from("bookings").select("*").gte("date", today()).lte("date", maxDate());
      if (!error && data) {
        const map = {};
        data.forEach(b => { map[`${b.desk_id}::${b.date}`] = { name: b.name, email: b.email }; });
        setBookings(map);
      }
    };
    load();
  }, []);

  const bkey = (id, d) => `${id}::${d}`;
  const bookedBy = (id) => bookings[bkey(id, date)] || null;

  const showStatus = (msg, type = "info") => { setStatus({ msg, type }); setTimeout(() => setStatus(null), 4000); };

  const attemptEdit = () => {
    if (editMode) { setEditMode(false); return; }
    setPinInput(""); setPinError(false); setPinModal(true);
  };
  const submitPin = () => {
    if (pinInput === ADMIN_PIN) { setPinModal(false); setEditMode(true); }
    else { setPinError(true); setPinInput(""); }
  };

  const onMouseDown = (e, desk) => {
    if (!editMode) return;
    e.preventDefault(); e.stopPropagation();
    const rect = svgRef.current.getBoundingClientRect();
    setDragId(desk.id);
    setDragStart({ cx: e.clientX, cy: e.clientY, ox: desk.x, oy: desk.y, r: desk.r, scale: SVG_W / rect.width });
    setLivePos({ x: desk.x, y: desk.y });
  };

  const onMouseMove = useCallback((e) => {
    if (!dragId || !dragStart) return;
    e.preventDefault();
    const dx = Math.round((e.clientX - dragStart.cx) * dragStart.scale / UNIT);
    const dy = Math.round((e.clientY - dragStart.cy) * dragStart.scale / UNIT);
    setLivePos(clampDesk(dragStart.ox + dx, dragStart.oy + dy, dragStart.r));
  }, [dragId, dragStart]);

  const onMouseUp = useCallback(async () => {
    if (!dragId || !livePos) return;
    const desk = desks.find(d => d.id === dragId);
    if (desk && (desk.x !== livePos.x || desk.y !== livePos.y)) {
      setDesks(prev => prev.map(d => d.id === dragId ? { ...d, x: livePos.x, y: livePos.y } : d));
      await db.from("desks").update({ x: livePos.x, y: livePos.y }).eq("id", dragId);
    }
    setDragId(null); setDragStart(null); setLivePos(null);
  }, [dragId, livePos, desks]);

  const rotateDesk = async (e, id) => {
    e.stopPropagation();
    const desk = desks.find(d => d.id === id);
    if (!desk) return;
    const nr = !desk.r;
    const clamped = clampDesk(desk.x, desk.y, nr);
    const updated = { ...desk, r: nr, ...clamped };
    setDesks(prev => prev.map(d => d.id === id ? updated : d));
    await db.from("desks").update({ r: nr, x: clamped.x, y: clamped.y }).eq("id", id);
  };

  const confirmBooking = async () => {
    if (!user) return;
    setLoading(true);
    const key = bkey(modal.desk.id, date);
    const { error } = await db.from("bookings").insert({ desk_id: modal.desk.id, date, name: user.name, email: user.email });
    if (error) {
      showStatus("Booking failed — please try again", "error");
    } else {
      setBookings(prev => ({ ...prev, [key]: { name: user.name, email: user.email } }));
      setModal(null);
      showStatus(`${modal.desk.label} booked for ${user.name}`, "success");
    }
    setLoading(false);
  };

  const cancelBooking = async () => {
    const booking = bookedBy(modal.desk.id);
    if (!booking) return;
    const isOwner = user && user.email === booking.email;
    const isAdmin = editMode;
    if (!isOwner && !isAdmin) { showStatus("You can only cancel your own bookings", "error"); setModal(null); return; }
    const { error } = await db.from("bookings").delete().eq("desk_id", modal.desk.id).eq("date", date);
    if (!error) {
      setBookings(prev => { const n = { ...prev }; delete n[bkey(modal.desk.id, date)]; return n; });
      setModal(null);
      showStatus(`Booking for ${modal.desk.label} cancelled`);
    }
  };

  const exportBookings = async () => {
    const { data, error } = await db.from("bookings").select("*").order("date").order("desk_id");
    if (error || !data || data.length === 0) { showStatus("No bookings to export", "info"); return; }
    const rows = [["Name", "Email", "Desk", "Date"], ...data.map(b => [b.name, b.email, b.desk_id, b.date])];
    const csv = rows.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "justco-bookings.csv"; a.click();
    URL.revokeObjectURL(url);
    showStatus(`Exported ${data.length} booking${data.length !== 1 ? "s" : ""}`, "success");
  };

  const renderDesk = (desk) => {
    const booking = bookedBy(desk.id);
    const booked = !!booking;
    const isDragging = dragId === desk.id;
    const gxv = isDragging && livePos ? livePos.x : desk.x;
    const gyv = isDragging && livePos ? livePos.y : desk.y;
    const w = (desk.r ? DH : DW) * UNIT, h = (desk.r ? DW : DH) * UNIT;
    const bx = gx(gxv) + PAD, by = gy(gyv) + PAD;
    const rw = w - PAD*2, rh = h - PAD*2;
    const isOwn = user && booking && user.email === booking.email;
    const fill = booked ? (isOwn ? "#E6F1FB" : "#FCEBEB") : "#E6FBF2";
    const stroke = booked ? (isOwn ? "#378ADD" : "#A32D2D") : "#00BF65";
    const tc = booked ? (isOwn ? "#0C447C" : "#791F1F") : "#007A40";
    return (
      <g key={desk.id} opacity={isDragging ? 0.5 : 1}
        style={{ cursor: editMode ? (isDragging ? "grabbing" : "grab") : "pointer" }}
        onMouseDown={editMode ? (e) => onMouseDown(e, desk) : undefined}
        onClick={!editMode ? () => setModal({ desk, existing: booking }) : undefined}>
        <rect x={bx} y={by} width={rw} height={rh} fill={fill} stroke={stroke} strokeWidth={1} rx={4} />
        <text x={bx+rw/2} y={by+rh/2-(booked?8:0)} textAnchor="middle" dominantBaseline="middle" fontSize={11} fontWeight="500" fill={tc} style={{pointerEvents:"none"}}>{desk.label}</text>
        {booked && <text x={bx+rw/2} y={by+rh/2+8} textAnchor="middle" dominantBaseline="middle" fontSize={9} fill={tc} style={{pointerEvents:"none"}}>{booking.name.length>11?booking.name.slice(0,11)+"…":booking.name}</text>}
        {editMode && !isDragging && (
          <g onMouseDown={e=>e.stopPropagation()} onClick={(e)=>rotateDesk(e,desk.id)} style={{cursor:"pointer"}}>
            <rect x={bx+rw-20} y={by+3} width={17} height={17} rx={3} fill="white" stroke={stroke} strokeWidth={0.5} opacity={0.92}/>
            <text x={bx+rw-11} y={by+12} textAnchor="middle" dominantBaseline="middle" fontSize={13} fill={tc} style={{pointerEvents:"none"}}>↻</text>
          </g>
        )}
      </g>
    );
  };

  const gridLines = [];
  if (editMode) {
    for (let c=0;c<=GCOLS;c++) gridLines.push(<line key={`v${c}`} x1={c*UNIT} y1={0} x2={c*UNIT} y2={SVG_H} stroke="#ccc" strokeWidth={0.5}/>);
    for (let r=0;r<=GROWS;r++) gridLines.push(<line key={`h${r}`} x1={0} y1={r*UNIT} x2={SVG_W} y2={r*UNIT} stroke="#ccc" strokeWidth={0.5}/>);
  }

  const s = {
    wrap: { maxWidth:780, margin:"0 auto", padding:"1.5rem 1rem" },
    bar: { display:"flex", alignItems:"center", gap:10, marginBottom:14, flexWrap:"wrap" },
    dateInput: { fontSize:14, padding:"4px 8px", borderRadius:6, border:"1px solid #ccc", background:"#fff" },
    btn: (active) => ({ fontSize:13, padding:"5px 14px", borderRadius:6, border:"1px solid #ccc", background:active?"#E6FBF2":"#fff", color:active?"#007A40":"#1a1a1a" }),
    legend: { display:"flex", gap:10, marginLeft:"auto", flexWrap:"wrap" },
    legendItem: { display:"flex", alignItems:"center", gap:5, fontSize:12, color:"#555" },
    info: (type) => ({ fontSize:13, padding:"6px 12px", borderRadius:6, marginBottom:10, background:type==="success"?"#E6FBF2":type==="error"?"#FCEBEB":"#E6F1FB", color:type==="success"?"#007A40":type==="error"?"#791F1F":"#0C447C", border:`0.5px solid ${type==="success"?"#00BF65":type==="error"?"#A32D2D":"#378ADD"}` }),
    footer: { marginTop:8, fontSize:12, color:"#666" },
    overlay: { position:"fixed", inset:0, background:"rgba(0,0,0,0.35)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 },
    card: { background:"#fff", borderRadius:12, border:"1px solid #ddd", padding:"1.5rem", width:320, maxWidth:"90vw" },
    mTitle: { fontWeight:500, fontSize:16, marginBottom:4 },
    mSub: { fontSize:13, color:"#666", marginBottom:16 },
    row: { display:"flex", gap:8 },
    btnGreen: { flex:1, padding:8, borderRadius:6, border:"1px solid #00BF65", background:"#E6FBF2", color:"#007A40", fontSize:13 },
    btnRed: { flex:1, padding:8, borderRadius:6, border:"1px solid #A32D2D", background:"#FCEBEB", color:"#791F1F", fontSize:13 },
    btnBlue: { flex:1, padding:8, borderRadius:6, border:"1px solid #378ADD", background:"#E6F1FB", color:"#0C447C", fontSize:13 },
    btnNeutral: { flex:1, padding:8, borderRadius:6, border:"1px solid #ccc", background:"#fff", color:"#1a1a1a", fontSize:13 },
    pinError: { fontSize:12, color:"#A32D2D", marginBottom:8 },
    avatar: { width:30, height:30, borderRadius:"50%", border:"1px solid #ccc" },
    userBar: { display:"flex", alignItems:"center", gap:8, marginLeft:"auto" },
    signOutBtn: { fontSize:12, padding:"3px 10px", borderRadius:6, border:"1px solid #ccc", background:"#fff", color:"#666" },
  };

  // Sign-in screen
  if (!user) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#f5f5f3" }}>
      <div style={{ background:"#fff", borderRadius:16, border:"1px solid #ddd", padding:"2.5rem 2rem", width:340, textAlign:"center" }}>
        <h1 style={{ fontSize:20, fontWeight:500, color:"#00BF65", marginBottom:8 }}>JustCo Hot Desk Bookings</h1>
        <p style={{ fontSize:14, color:"#666", marginBottom:24 }}>Sign in with your Google account to book a desk</p>
        <div id="g-signin-btn" style={{ display:"flex", justifyContent:"center" }}></div>
      </div>
    </div>
  );

  if (appLoading) return (
    <div style={{ textAlign:"center", paddingTop:"3rem", color:"#666" }}>Loading desk layout…</div>
  );

  return (
    <div style={s.wrap}>
      <div style={{ display:"flex", alignItems:"center", marginBottom:16, gap:12 }}>
        <h1 style={{ fontSize:20, fontWeight:500, color:"#00BF65" }}>JustCo Hot Desk Bookings</h1>
        <div style={s.userBar}>
          {user.picture && <img src={user.picture} style={s.avatar} referrerPolicy="no-referrer" />}
          <span style={{ fontSize:13, color:"#555" }}>{user.name}</span>
          <button onClick={signOut} style={s.signOutBtn}>Sign out</button>
        </div>
      </div>

      <div style={s.bar}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <button onClick={() => setDate(d => addDays(d, -1))} style={{...s.btn(false), padding:"4px 10px", fontSize:16}}>‹</button>
          <input type="date" value={date} min={today()} max={maxDate()} onChange={e => setDate(e.target.value)} style={s.dateInput} />
          <button onClick={() => setDate(d => addDays(d, 1))} disabled={date >= maxDate()} style={{...s.btn(false), padding:"4px 10px", fontSize:16, opacity:date>=maxDate()?0.35:1}}>›</button>
        </div>
        <button onClick={attemptEdit} style={s.btn(editMode)}>{editMode ? "Done editing" : "Edit layout"}</button>
        <button onClick={exportBookings} style={s.btn(false)}>Export bookings</button>
        <div style={s.legend}>
          {[["Your booking","#E6F1FB","#378ADD"],["Available","#E6FBF2","#00BF65"],["Booked","#FCEBEB","#A32D2D"]].map(([lbl,bg,col]) => (
            <span key={lbl} style={s.legendItem}>
              <span style={{width:14,height:8,borderRadius:2,background:bg,border:`1px solid ${col}`,display:"inline-block"}}/>{lbl}
            </span>
          ))}
        </div>
      </div>

      {editMode && <div style={s.info("info")}>Drag desks to move — they snap to the grid. Click ↻ to rotate.</div>}
      {status && <div style={s.info(status.type)}>{status.msg}</div>}

      <div style={{ overflowX:"auto", userSelect:"none" }}>
        <svg ref={svgRef} width={SVG_W} height={SVG_H} viewBox={`0 0 ${SVG_W} ${SVG_H}`}
          style={{ display:"block", borderRadius:8, border:"1px solid #ddd", background:"#f9f9f7", touchAction:"none" }}
          onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
          {gridLines}
          {desks.filter(d => d.id !== dragId).map(renderDesk)}
          {dragId && desks.filter(d => d.id === dragId).map(renderDesk)}
        </svg>
      </div>

      <div style={s.footer}>{fmtDate(date)} — {desks.filter(d => !bookedBy(d.id)).length} of {desks.length} desks available</div>

      {/* PIN modal */}
      {pinModal && (
        <div style={s.overlay} onClick={e => { if (e.target===e.currentTarget) setPinModal(false); }}>
          <div style={s.card}>
            <p style={s.mTitle}>Admin access</p>
            <p style={{...s.mSub, marginBottom:12}}>Enter your PIN to edit the layout</p>
            {pinError && <p style={s.pinError}>Incorrect PIN — try again</p>}
            <input type="password" placeholder="PIN" value={pinInput} autoFocus
              onChange={e => { setPinInput(e.target.value); setPinError(false); }}
              onKeyDown={e => e.key==="Enter" && submitPin()}
              style={{ width:"100%", fontSize:14, padding:"8px 10px", borderRadius:6, border:"1px solid #ccc", marginBottom:12 }} />
            <div style={s.row}>
              <button onClick={submitPin} style={s.btnGreen}>Enter</button>
              <button onClick={() => setPinModal(false)} style={s.btnNeutral}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Booking modal */}
      {modal && (
        <div style={s.overlay} onClick={e => { if (e.target===e.currentTarget) setModal(null); }}>
          <div style={s.card}>
            <p style={s.mTitle}>{modal.desk.label}</p>
            <p style={s.mSub}>{fmtDate(date)}</p>
            {modal.existing ? (
              <>
                <p style={{ fontSize:14, marginBottom:4 }}>Booked by <strong>{modal.existing.name}</strong></p>
                <p style={{ fontSize:12, color:"#888", marginBottom:16 }}>{modal.existing.email}</p>
                <div style={s.row}>
                  {(user.email === modal.existing.email || editMode) && (
                    <button onClick={cancelBooking} style={s.btnRed}>Cancel booking</button>
                  )}
                  <button onClick={() => setModal(null)} style={s.btnNeutral}>Close</button>
                </div>
                {user.email !== modal.existing.email && !editMode && (
                  <p style={{ fontSize:12, color:"#A32D2D", marginTop:10 }}>Only the person who booked this desk can cancel it.</p>
                )}
              </>
            ) : (
              <>
                <p style={{ fontSize:14, marginBottom:16 }}>Booking as <strong>{user.name}</strong></p>
                <div style={s.row}>
                  <button onClick={confirmBooking} disabled={loading}
                    style={{...s.btnGreen, opacity:loading?0.5:1}}>
                    {loading ? "Booking…" : "Book desk"}
                  </button>
                  <button onClick={() => setModal(null)} style={s.btnNeutral}>Cancel</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
